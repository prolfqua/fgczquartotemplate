name: altdoc

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  altdoc:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::altdoc
            any::rmarkdown
            any::knitr
            any::DT
            any::ggplot2
            any::plotly
          needs: website

      - name: Verify extension assets are in sync
        run: |
          Rscript data-raw/sync_assets.R
          if [ -n "$(git status --porcelain -- _extensions vignettes/_extensions)" ]; then
            echo "::error::extension out of sync with inst/quarto — run data-raw/sync_assets.R and commit"
            git --no-pager diff -- _extensions vignettes/_extensions
            exit 1
          fi

      - name: Install package
        run: R CMD INSTALL .

      - name: Build docs with altdoc
        run: Rscript -e 'altdoc::render_docs(freeze = FALSE)'

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: true
